<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AVP Launcher</title>
  <style>
    :root {
      --bg: #060d1f;
      --bg2: #0d1a36;
      --card: rgba(10, 20, 44, 0.82);
      --line: rgba(124, 174, 255, 0.28);
      --text: #e9f2ff;
      --muted: #a8c1e8;
      --accent: #2ba8ff;
      --accent2: #7f75ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 360px at 15% -20%, rgba(43, 168, 255, 0.24), transparent 60%),
        radial-gradient(900px 360px at 90% -15%, rgba(127, 117, 255, 0.24), transparent 60%),
        linear-gradient(160deg, var(--bg) 0%, var(--bg2) 100%);
      padding: 20px;
    }
    .card {
      width: min(560px, 100%);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 28px 22px;
      background: var(--card);
      backdrop-filter: blur(8px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      text-align: center;
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(24px, 3.2vw, 32px);
      letter-spacing: 0.02em;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }
    .open-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: min(360px, 100%);
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(189, 220, 255, 0.35);
      text-decoration: none;
      color: #f8fcff;
      font-weight: 700;
      letter-spacing: 0.01em;
      background: linear-gradient(120deg, rgba(43, 168, 255, 0.42), rgba(127, 117, 255, 0.44));
      transition: transform .15s ease, box-shadow .15s ease;
      box-shadow: 0 12px 28px rgba(17, 91, 179, 0.35);
    }
    .open-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 34px rgba(17, 91, 179, 0.45);
    }
    .hint {
      margin-top: 14px;
      font-size: 12px;
      color: #8eaad2;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>AVP ワンクリック起動</h1>
    <p>下のボタンを1回押すだけで、プロダクトガイド専用モックを開けます。</p>
    <a class="open-btn" href="./product-guide-app/index.html">プロダクトガイドを開く</a>
    <div class="hint">開けない場合は、同じフォルダの `product-guide-app/index.html` を直接開いてください。</div>
  </main>
</body>
</html>
